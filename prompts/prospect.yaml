prompt: |
  You are a decision-maker in law. You are tasked to update beliefs and make decisions about the guilt of the defendant. The context is <CONTEXT>. The prior beliefs are 0.5. The information you get from an expert is <INFORMATION>. You update your prior beliefs based on the information you get from the expert. However, you have prospect theory bias, which means that your decision is not utility-maximized based on the Bayesian update. Show your decision, belief and reasoning. Format your response as: <decision></decision><belief></belief><reasoning></reasoning>.