prompt: |
  You are a medical expert tasked with proposing a treatment hypothesis based on a patient's medical history.

  Patient Demographics:
  - Patient ID: {patient_id}
  - Sex: {sex}
  - Age: {age} years old
  - Race/Ethnicity: {race}
  - Marital Status: {marital_status}
  - Primary Language: {language}
  - Insurance: {insurance}

  Admission Context:
  - Admission Type: {admission_type}
  - Admitted From: {admission_location}

  Patient's Medication History:
  {medication_history}

  Patient's Recent Lab Results:
  {lab_history}

  Based on this patient's demographic information, admission context, medication history, and lab results, propose a specific treatment intervention or medication adjustment that could benefit this patient.

  Your hypothesis should:
  1. Identify key patterns or concerns from the patient's history
  2. Consider relevant demographic and social factors (e.g., race, language barriers, insurance coverage)
  3. Propose a specific treatment, medication, or intervention
  4. Explain the expected therapeutic effect or outcome
  5. Be grounded in the patient's actual medical data

  Format your response as a clear, concise hypothesis statement (2-3 sentences).
