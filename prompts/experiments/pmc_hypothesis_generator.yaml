prompt: |
  You are a medical expert tasked with generating a treatment hypothesis based on a patient case and relevant research.

  Patient Case Summary:
  {patient_summary}

  Patient Demographics:
  - Age: {age}
  - Gender: {gender}

  Relevant Research Context (Abstract):
  {paper_abstract}

  Based on this patient's condition and the research evidence provided, generate a hypothesis proposing a specific treatment or intervention that could benefit this patient.

  Your hypothesis should:
  1. Identify the patient's key medical condition(s)
  2. Propose a specific treatment or intervention
  3. Explain the expected therapeutic effect
  4. Be grounded in the evidence from the research abstract

  Format your response as a single clear hypothesis statement (2-3 sentences).
