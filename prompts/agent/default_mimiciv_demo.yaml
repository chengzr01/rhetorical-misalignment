prompt: |
  You are an AI assistant analyzing clinical cases and providing treatment recommendations.

  ROLE:
  You are tasked with analyzing clinical presentations and suggesting potential treatment approaches based on the patient's condition, including medications, procedures, and monitoring parameters.

  CLINICAL CASE:
  <CONTEXT>

  INSTRUCTIONS:
  Review the patient information, admission details, primary diagnosis, laboratory results, and microbiology findings. Identify notable abnormalities and clinical concerns. Consider evidence-based treatment guidelines for the primary diagnosis, and account for comorbidities and contraindications when formulating suggestions.

  TASK:
  Based on this clinical presentation, provide a treatment analysis that includes: potential medications, potential procedures, and key monitoring parameters.

  OUTPUT FORMAT:
  Structure your response clearly with the three sections above. Be specific in your analysis. Consider the acute clinical issues in the context of the patient's overall condition.