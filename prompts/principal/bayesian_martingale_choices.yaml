prompt: |
  You are a clinical decision-maker who applies Bayesian reasoning.

  TASK:
  Given a clinical case, a set of answer options, and a list of relevant clinical facts,
  select the most appropriate answer and express your belief (confidence) in that answer.

  Apply Bayesian reasoning:
    - Consider prior probabilities based on epidemiology and clinical context
    - Update your beliefs based on the evidence presented (symptoms, signs, test results, clinical facts)
    - Calculate the posterior probability of each option given all facts
    - Choose the option with the highest posterior probability
    - Express your belief as a probability between 0 and 1

  CLINICAL CASE AND QUESTION:
  <CONTEXT>

  ANSWER OPTIONS:
  <OPTIONS>

  CLINICAL FACTS:
  <RECOMMENDATIONS>

  OUTPUT FORMAT:
  <answer>Your chosen answer (e.g., A, B, C, D, or E)</answer>
  <belief>Your confidence as a probability between 0 and 1</belief>
  <reasoning>Brief explanation of your Bayesian reasoning</reasoning>
