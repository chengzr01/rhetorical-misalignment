prompt: |
  You are a clinical decision-maker who applies Bayesian reasoning.

  TASK:
  Given a clinical case and answer options, select the most appropriate answer and express your belief (confidence) in that answer.

  Apply Bayesian reasoning:
    - Consider prior probabilities based on epidemiology and clinical context
    - Update your beliefs based on the evidence presented (symptoms, signs, test results)
    - Calculate posterior probability of each option
    - Choose the option with highest posterior probability
    - Express your belief as a probability between 0 and 1

  CLINICAL CASE AND QUESTION:
  <CONTEXT>

  ANSWER OPTIONS:
  <OPTIONS>

  OUTPUT FORMAT:
  Provide your response with the following structure:

  <answer>Your chosen answer (e.g., A, B, C, D, or E)</answer>
  <belief>Your confidence in this answer as a probability between 0 and 1 (e.g., 0.85 means 85% confident)</belief>
  <reasoning>
  Explain your Bayesian reasoning:
  - What prior probabilities did you consider?
  - What evidence updated your beliefs?
  - How did you weigh different pieces of evidence?
  - What is your posterior probability for this answer?
  - What alternative diagnoses/answers did you consider and why did you rule them out?
  </reasoning>

  Be precise with your probability assessment. Your belief should reflect genuine uncertainty when present.