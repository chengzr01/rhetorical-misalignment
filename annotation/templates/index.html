{% extends "base.html" %}

{% block content %}
<h1 style="text-align: center;">Clinical Decision Annotation System</h1>

<div style="max-width: 900px; margin: 0 auto;">
    <div style="margin-bottom: 40px;">
        <p style="font-size: 18px; color: #555; line-height: 1.8;">
            Welcome to the Clinical Decision Annotation System. Before participating,
            please review the research consent form below.
        </p>
    </div>

    <!-- Research Consent Section -->
    <div style="margin: 40px 0 30px 0;">
        <div
            id="consent-header"
            style="background: #667eea; color: white; padding: 18px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; transition: background-color 0.3s ease;"
            onclick="toggleConsent()">
            <h2 style="margin: 0; color: white; border: none; padding: 0; font-size: 1.3em; font-weight: 500;">Research Consent Form</h2>
            <span id="consent-toggle-icon" style="font-size: 20px; font-weight: bold; transition: transform 0.3s ease;">▼</span>
        </div>
        <div id="consent-body" style="padding: 30px; background: #f8f9fa; max-height: 500px; overflow-y: auto; border-radius: 0 0 8px 8px; border: 1px solid #ddd; border-top: none; margin-top: 0;">
            {% include 'consent.html' %}
        </div>
    </div>

    <div style="text-align: center; margin: 40px 0;">
        <button
            type="button"
            class="btn btn-primary"
            id="continue-button"
            onclick="proceedToDemographics()"
            style="padding: 15px 50px; font-size: 18px;">
            Continue
        </button>
    </div>
</div>

<script>
// Consent form toggle functionality
function toggleConsent() {
    const consentBody = document.getElementById('consent-body');
    const toggleIcon = document.getElementById('consent-toggle-icon');

    if (consentBody.style.display === 'none') {
        consentBody.style.display = 'block';
        toggleIcon.style.transform = 'rotate(0deg)';
        toggleIcon.textContent = '▼';
    } else {
        consentBody.style.display = 'none';
        toggleIcon.style.transform = 'rotate(-90deg)';
        toggleIcon.textContent = '▶';
    }
}

// Consent validation
function validateConsent() {
    const consentRadios = document.querySelectorAll('input[name="consent"]');
    const continueButton = document.getElementById('continue-button');
    const consentHeader = document.getElementById('consent-header');
    let agreed = false;

    consentRadios.forEach(radio => {
        if (radio.checked && radio.value === 'agree') {
            agreed = true;
        }
    });

    if (agreed) {
        continueButton.disabled = false;
        continueButton.style.opacity = '1';
        continueButton.style.cursor = 'pointer';
        consentHeader.style.background = '#2ecc71';
    } else {
        continueButton.disabled = true;
        continueButton.style.opacity = '0.5';
        continueButton.style.cursor = 'not-allowed';
        consentHeader.style.background = '#667eea';
    }

    return agreed;
}

// Proceed to demographics page
function proceedToDemographics() {
    if (validateConsent()) {
        window.location.href = '/demographics';
    } else {
        alert('Please read and agree to the consent form before proceeding.');
        // Expand consent form if collapsed
        const consentBody = document.getElementById('consent-body');
        const toggleIcon = document.getElementById('consent-toggle-icon');
        consentBody.style.display = 'block';
        toggleIcon.style.transform = 'rotate(0deg)';
        toggleIcon.textContent = '▼';
        // Scroll to consent form
        document.getElementById('consent-header').scrollIntoView({ behavior: 'smooth' });
    }
}

// Add event listeners to consent radio buttons
document.addEventListener('DOMContentLoaded', function() {
    // Initialize button as disabled
    const continueButton = document.getElementById('continue-button');
    continueButton.disabled = true;
    continueButton.style.opacity = '0.5';
    continueButton.style.cursor = 'not-allowed';

    const consentRadios = document.querySelectorAll('input[name="consent"]');
    consentRadios.forEach(radio => {
        radio.addEventListener('change', validateConsent);
    });
});
</script>
{% endblock %}
